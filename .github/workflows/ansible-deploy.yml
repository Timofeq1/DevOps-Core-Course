name: Ansible Deployment

on:
  push:
    branches: [ "master", "main", "lab06" ]
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-deploy.yml"
      - "!ansible/docs/**"
  pull_request:
    branches: [ "master", "main", "lab06" ]
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-deploy.yml"
      - "!ansible/docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/collections/requirements.yml

      - name: Run ansible-lint
        run: |
          ansible-lint ansible/playbooks/*.yml ansible/roles

  deploy:
    name: Deploy Web App
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/collections/requirements.yml

      - name: Configure SSH access to Yandex Cloud VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Create CI inventory
        run: |
          printf '%s\n' \
            '[webservers]' \
            "yc-vm ansible_host=${{ secrets.VM_HOST }} ansible_user=${{ secrets.VM_USER }}" \
            '' \
            '[webservers:vars]' \
            'ansible_python_interpreter=/usr/bin/python3' \
            > ansible/inventory/ci-hosts.ini

      - name: Run Ansible deployment
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass
          cd ansible
          ansible-playbook playbooks/provision.yml -i inventory/ci-hosts.ini --vault-password-file /tmp/vault_pass --tags "common,docker"
          ansible-playbook playbooks/deploy.yml -i inventory/ci-hosts.ini --vault-password-file /tmp/vault_pass --tags "app_deploy,compose"
          rm -f /tmp/vault_pass

      - name: Verify deployment
        run: |
          curl -fsS "http://${{ secrets.VM_HOST }}:5000/health"
          curl -fsS "http://${{ secrets.VM_HOST }}:5000/"
