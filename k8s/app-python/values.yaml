replicaCount: 3

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

image:
  repository: timofeq1/devops-lab03-python
  tag: "latest"
  pullPolicy: IfNotPresent

containerPort: 5000

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"

appConfig:
  name: "devops-info-service"
  environment: "dev"
  logLevel: "info"

config:
  mountPath: "/config"
  fileName: "config.json"

visits:
  filePath: "/data/visits"

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 100Mi
  storageClass: ""
  mountPath: "/data"

secret:
  enabled: true
  name: ""
  data:
    username: "change-me"
    password: "change-me"

vault:
  enabled: false
  role: "app-python"
  secretPath: "secret/data/myapp/config"
  injectFileName: "config"
  agentInjectCommand: ""
  injectTemplate: |
    {{- with secret "secret/data/myapp/config" -}}
    APP_USERNAME={{ .Data.data.username }}
    APP_PASSWORD={{ .Data.data.password }}
    {{- end -}}

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30084

# -- Progressive delivery strategy configuration
strategy:
  # -- Strategy type: "canary", "blueGreen", or "rollingUpdate" (defaults to Deployment)
  type: canary
  canary:
    # -- Canary steps for progressive traffic shifting
    steps:
      - setWeight: 20
      - pause: {}  # Manual promotion required
      - setWeight: 40
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 30s
      - setWeight: 80
      - pause:
          duration: 30s
      - setWeight: 100
    # -- Optional traffic routing configuration (e.g., for Istio/NGINX)
    # trafficRouting:
    #   nginx:
    #     stableIngress: app-python-stable
  blueGreen:
    autoPromotionEnabled: false
    # autoPromotionSeconds: 30
    # prePromotionAnalysis:
    #   templates:
    #     - templateName: success-rate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# -- Preview service for blue-green deployments
previewService:
  nodePort: 30086

# -- Automated analysis for progressive delivery (bonus)
analysis:
  enabled: false
  metricName: webcheck
  webURL: ""  # Auto-generated if empty
  jsonPath: "{$.status}"
  successCondition: "result == 'ok'"
  interval: 10s
  count: 3
  failureLimit: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: local.example.com
      paths:
        - path: /app1(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - local.example.com
      secretName: apps-tls-secret

hooks:
  enabled: true
  image: busybox:1.36
  preInstallCommand: 'echo "Pre-install validation for {{ .Release.Name }}" && sleep 5 && echo "Pre-install finished"'
  postInstallCommand: 'echo "Post-install smoke test for {{ .Release.Name }}" && sleep 5 && echo "Post-install finished"'
