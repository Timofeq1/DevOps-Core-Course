replicaCount: 3

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

image:
  repository: timofeq1/devops-lab03-python
  tag: "latest"
  pullPolicy: IfNotPresent

containerPort: 5000

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"

appConfig:
  environment: "dev"
  logLevel: "info"

secret:
  enabled: true
  name: ""
  data:
    username: "change-me"
    password: "change-me"

vault:
  enabled: false
  role: "app-python"
  secretPath: "secret/data/myapp/config"
  injectFileName: "config"
  agentInjectCommand: ""
  injectTemplate: |
    {{- with secret "secret/data/myapp/config" -}}
    APP_USERNAME={{ .Data.data.username }}
    APP_PASSWORD={{ .Data.data.password }}
    {{- end -}}

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: local.example.com
      paths:
        - path: /app1(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - local.example.com
      secretName: apps-tls-secret

hooks:
  enabled: true
  image: busybox:1.36
  preInstallCommand: 'echo "Pre-install validation for {{ .Release.Name }}" && sleep 5 && echo "Pre-install finished"'
  postInstallCommand: 'echo "Post-install smoke test for {{ .Release.Name }}" && sleep 5 && echo "Post-install finished"'
