replicaCount: 5

appConfig:
  environment: "prod"
  logLevel: "info"

image:
  tag: "1.0.0"

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000
  nodePort: null

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 3

secret:
  enabled: true

vault:
  enabled: false
