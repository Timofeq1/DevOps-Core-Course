replicaCount: 5

appConfig:
  name: "devops-info-service"
  environment: "prod"
  logLevel: "info"

visits:
  filePath: "/data/visits"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

image:
  tag: "1.0.0"

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000
  nodePort: null

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 3

secret:
  enabled: true

vault:
  enabled: false
