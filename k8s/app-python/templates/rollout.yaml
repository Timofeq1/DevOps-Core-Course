{{- if eq .Values.strategy.type "canary" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        {{ printf "vault.hashicorp.com/agent-inject-secret-%s" .Values.vault.injectFileName }}: {{ .Values.vault.secretPath | quote }}
        {{ printf "vault.hashicorp.com/agent-inject-template-%s" .Values.vault.injectFileName }}: |
{{ .Values.vault.injectTemplate | nindent 10 }}
        {{- if .Values.vault.agentInjectCommand }}
        {{ printf "vault.hashicorp.com/agent-inject-command-%s" .Values.vault.injectFileName }}: {{ .Values.vault.agentInjectCommand | quote }}
        {{- end }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "app-python.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "app-python.envConfigMapName" . }}
          {{- if .Values.secret.enabled }}
            - secretRef:
                name: {{ include "app-python.secretName" . }}
          {{- end }}
          env:
            {{- with .Values.env }}
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "app-python.fileConfigMapName" . }}
        - name: data-volume
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "app-python.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
  strategy:
    canary:
      {{- if .Values.strategy.canary.steps }}
      steps:
{{ toYaml .Values.strategy.canary.steps | indent 8 }}
      {{- end }}
      {{- if .Values.strategy.canary.trafficRouting }}
      trafficRouting:
{{ toYaml .Values.strategy.canary.trafficRouting | indent 8 }}
      {{- end }}
{{- end }}

{{- if eq .Values.strategy.type "blueGreen" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        {{ printf "vault.hashicorp.com/agent-inject-secret-%s" .Values.vault.injectFileName }}: {{ .Values.vault.secretPath | quote }}
        {{ printf "vault.hashicorp.com/agent-inject-template-%s" .Values.vault.injectFileName }}: |
{{ .Values.vault.injectTemplate | nindent 10 }}
        {{- if .Values.vault.agentInjectCommand }}
        {{ printf "vault.hashicorp.com/agent-inject-command-%s" .Values.vault.injectFileName }}: {{ .Values.vault.agentInjectCommand | quote }}
        {{- end }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "app-python.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "app-python.envConfigMapName" . }}
          {{- if .Values.secret.enabled }}
            - secretRef:
                name: {{ include "app-python.secretName" . }}
          {{- end }}
          env:
            {{- with .Values.env }}
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "app-python.fileConfigMapName" . }}
        - name: data-volume
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "app-python.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
  strategy:
    blueGreen:
      activeService: {{ include "common.fullname" . }}
      previewService: {{ include "common.fullname" . }}-preview
      autoPromotionEnabled: {{ .Values.strategy.blueGreen.autoPromotionEnabled }}
      {{- if .Values.strategy.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ .Values.strategy.blueGreen.autoPromotionSeconds }}
      {{- end }}
      {{- if .Values.strategy.blueGreen.prePromotionAnalysis }}
      prePromotionAnalysis:
{{ toYaml .Values.strategy.blueGreen.prePromotionAnalysis | indent 8 }}
      {{- end }}
{{- end }}
