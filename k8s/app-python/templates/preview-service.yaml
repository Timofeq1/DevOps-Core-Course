{{- if eq .Values.strategy.type "blueGreen" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "common.fullname" . }}-preview
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: preview
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "common.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      {{- if and (or (eq .Values.service.type "NodePort") (eq .Values.service.type "LoadBalancer")) .Values.previewService.nodePort }}
      nodePort: {{ .Values.previewService.nodePort }}
      {{- end }}
{{- end }}
