replicaCount: 1

appConfig:
  name: "devops-info-service"
  environment: "dev"
  logLevel: "debug"

visits:
  filePath: "/data/visits"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""

image:
  tag: "latest"

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30085

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 3
  periodSeconds: 5

secret:
  enabled: true

vault:
  enabled: false

# -- Progressive delivery strategy (dev: canary with shorter pauses)
strategy:
  type: canary
  canary:
    steps:
      - setWeight: 30
      - pause: {}  # Manual promotion for first step
      - setWeight: 60
      - pause:
          duration: 10s
      - setWeight: 100

# -- Preview service nodePort for blue-green
previewService:
  nodePort: 30086

# -- Automated analysis (disabled by default)
analysis:
  enabled: false
