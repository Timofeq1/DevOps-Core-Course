# Lab 16 Bonus -- ServiceMonitor for Prometheus scraping
# This tells the Prometheus Operator to scrape /metrics from our app-python pods
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: app-python-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: app-python
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
