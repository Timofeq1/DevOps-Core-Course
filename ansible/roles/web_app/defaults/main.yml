---
app_name: devops-app
docker_image: "{{ dockerhub_username | default('your_dockerhub_username') }}/devops-info-service"
docker_tag: "{{ docker_image_tag | default('latest') }}"
app_port: 8000
app_internal_port: 5000

compose_project_dir: "/opt/{{ app_name }}"
docker_compose_version: "3.8"

app_env: {}
app_env_name: production
app_secret_key: change-me

app_healthcheck_url: "http://127.0.0.1:{{ app_port }}/health"
app_healthcheck_timeout: 60
app_healthcheck_delay: 2

# Set to true for explicit cleanup. Use together with --tags web_app_wipe.
web_app_wipe: false
web_app_wipe_remove_images: false

# Use missing for idempotent runs; switch to always when you need forced refresh.
web_app_pull_policy: missing
