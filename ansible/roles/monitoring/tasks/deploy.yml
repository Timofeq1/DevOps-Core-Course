---
- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Start monitoring stack via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_compose_project_dir }}"
    state: present
    pull: "{{ monitoring_pull_policy }}"
    recreate: auto
    remove_orphans: true

- name: Wait for Loki port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_loki_port }}"
    timeout: 120

- name: Wait for Grafana port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_grafana_port }}"
    timeout: 120

- name: Wait for Loki readiness endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_loki_port }}/ready"
    method: GET
    status_code: 200
  register: monitoring_loki_ready
  retries: 20
  delay: 3
  until: monitoring_loki_ready.status == 200

- name: Wait for Grafana health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/health"
    method: GET
    status_code: 200
  register: monitoring_grafana_ready
  retries: 20
  delay: 3
  until: monitoring_grafana_ready.status == 200
