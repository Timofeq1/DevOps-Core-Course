---
- name: Create monitoring directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ monitoring_compose_project_dir }}"
    - "{{ monitoring_compose_project_dir }}/loki"
    - "{{ monitoring_compose_project_dir }}/promtail"
    - "{{ monitoring_compose_project_dir }}/grafana"
    - "{{ monitoring_compose_project_dir }}/grafana/provisioning"
    - "{{ monitoring_compose_project_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_compose_project_dir }}/grafana/dashboards"

- name: Render monitoring compose manifest
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_compose_project_dir }}/docker-compose.yml"
    mode: "0644"

- name: Render monitoring environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ monitoring_compose_project_dir }}/.env"
    mode: "0600"

- name: Render Loki config
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_compose_project_dir }}/loki/config.yml"
    mode: "0644"

- name: Render Promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ monitoring_compose_project_dir }}/promtail/config.yml"
    mode: "0644"

- name: Render Grafana dashboard provisioning
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: "{{ monitoring_compose_project_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    mode: "0644"

- name: Render Lab07 dashboard JSON
  ansible.builtin.template:
    src: lab07-logs-dashboard.json.j2
    dest: "{{ monitoring_compose_project_dir }}/grafana/dashboards/lab07-logs-dashboard.json"
    mode: "0644"
