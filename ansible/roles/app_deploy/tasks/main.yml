---
- name: Validate Docker Hub credentials are provided
  ansible.builtin.assert:
    that:
      - dockerhub_username is defined
      - dockerhub_password is defined
      - dockerhub_username | trim | length > 0
      - dockerhub_password | trim | length > 0
      - dockerhub_username != 'your-dockerhub-username'
      - dockerhub_password != 'your-dockerhub-access-token'
    fail_msg: "Docker Hub credentials are missing or still placeholders in group_vars/all.yml"

- name: Ensure Docker service is running before registry login
  ansible.builtin.service:
    name: docker
    state: started

- name: Login to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
    registry_url: "{{ docker_registry_url }}"
    reauthorize: true
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull

- name: Stop existing container if running
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: stopped
  failed_when: false

- name: Remove old container if present
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    recreate: true
    env: "{{ app_env }}"
    published_ports:
      - "{{ app_port }}:5000"
  notify: restart app container

- name: Wait for application port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ app_port }}"
    timeout: "{{ app_healthcheck_timeout }}"
    delay: "{{ app_healthcheck_delay }}"

- name: Verify health endpoint
  ansible.builtin.uri:
    url: "{{ app_healthcheck_url }}"
    method: GET
    status_code: 200
    return_content: true
