---
docker_apt_arch: amd64
docker_apt_keyring_asc: /etc/apt/keyrings/docker.asc
docker_apt_keyring_gpg: /etc/apt/keyrings/docker.gpg
docker_apt_repo: "deb [arch={{ docker_apt_arch }} signed-by={{ docker_apt_keyring_gpg }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_users:
  - "{{ ansible_user | default('ubuntu') }}"

docker_python_package: python3-docker
