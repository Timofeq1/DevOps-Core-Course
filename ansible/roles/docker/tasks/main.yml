---
- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: "{{ docker_apt_keyring_asc }}"
    mode: "0644"
    force: true

- name: Convert Docker GPG key to apt keyring format
  ansible.builtin.command:
    cmd: "gpg --dearmor --yes --output {{ docker_apt_keyring_gpg }} {{ docker_apt_keyring_asc }}"

- name: Set Docker apt keyring permissions
  ansible.builtin.file:
    path: "{{ docker_apt_keyring_gpg }}"
    mode: "0644"
    state: file

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "{{ docker_apt_repo }}"
    state: present
    filename: docker
  notify: restart docker

- name: Install Docker engine packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Install docker Python binding package
  ansible.builtin.apt:
    name: "{{ docker_python_package }}"
    state: present
